<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanzar Proyecto Crisva</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            text-align: center;
        }
        .container {
            padding: 2rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
        }
        h1 { margin-bottom: 1rem; font-size: 1.5rem; color: #fff; }
        p { margin-bottom: 2rem; color: #a1a1aa; line-height: 1.5; }
        .btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
            margin: 0.5rem;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #e4e4e7;
        }
        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .status {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #71717a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crisva Design Lab</h1>
        <p>Asegúrate de que el servidor de desarrollo esté corriendo antes de entrar.</p>
        <a href="http://localhost:3000" class="btn">Abrir Servidor (Desarrollo)</a>
        <a href="out/index.html" class="btn secondary">Abrir Carpeta 'out' (Estático)</a>
        <div class="status">Desarrollo: http://localhost:3000 | Estático: out/index.html</div>
    </div>
    <script>
        // Redirección automática opcional si el usuario prefiere rapidez
        // window.location.href = "http://localhost:3000";
    </script>
</body>
</html>
